<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="admin-page">
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo">
            </div>
            <div class="loading-text">
                <span>D</span><span>R</span><span>I</span><span>P</span><span>&nbsp;</span>
                <span>C</span><span>L</span><span>I</span><span>E</span><span>N</span><span>T</span>
            </div>
            <div class="loading-progress">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content hidden" id="mainContent">
        <!-- Background Animation -->
        <div class="background-animation">
            <div class="gradient-bg"></div>
            <div class="particles"></div>
        </div>

        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-left">
                <div class="animated-logo">
                    <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Logo">
                </div>
                <div class="welcome-text">
                    <i class="fas fa-crown"></i>
                    <span>Admin Panel</span>
                </div>
            </div>
            <div class="header-right">
                <a href="home.html" class="view-site-btn">
                    <i class="fas fa-external-link-alt"></i>
                    View Site
                </a>
            </div>
        </header>

        <!-- Admin Dashboard -->
        <div class="admin-dashboard">
            <!-- Add Product Section -->
            <div class="admin-card fade-in">
                <h3><i class="fas fa-plus-circle"></i> Add New Product</h3>
                <form id="addProductForm">
                    <div class="form-group">
                        <label>Nama Product</label>
                        <input type="text" id="productName" required>
                    </div>
                    <div class="form-group">
                        <label>Image Product (Link)</label>
                        <input type="url" id="productImage" required>
                    </div>
                    <div class="form-group">
                        <label>Deskripsi Produk</label>
                        <textarea id="productDesc" rows="2" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Fitur (pisahkan dengan koma)</label>
                        <input type="text" id="productFeatures" placeholder="antiban, silent aim, wallhack">
                    </div>
                    <div class="form-group">
                        <label>Dropdown Harga (format: 1 Hari=20000,3 Hari=35000)</label>
                        <input type="text" id="productPrices" placeholder="1 Hari:20000,3 Hari:35000,7 Hari:75000,15 Hari:100000,1 Bulan:2000">
                    </div>
                    <button type="submit" class="admin-btn">Add Product</button>
                </form>
            </div>

            <!-- Add Promo Section -->
            <div class="admin-card fade-in">
                <h3><i class="fas fa-tag"></i> Add New Code Promo</h3>
                <form id="addPromoForm">
                    <div class="form-group">
                        <label>Code Promo</label>
                        <input type="text" id="promoCode" required>
                    </div>
                    <div class="form-group">
                        <label>Persen Promo (%)</label>
                        <input type="number" id="promoPercent" min="1" max="100" required>
                    </div>
                    <div class="form-group">
                        <label>Maximal Penggunaan</label>
                        <input type="number" id="promoMaxUse" min="1" required>
                    </div>
                    <button type="submit" class="admin-btn">Add Promo</button>
                </form>
            </div>

            <!-- Running Text Control -->
            <div class="admin-card fade-in">
                <h3><i class="fas fa-running"></i> Running Teks Control</h3>
                <form id="runningTextForm">
                    <div class="form-group">
                        <label>Running Teks</label>
                        <input type="text" id="runningText" placeholder="KODE PROMO TERBARU : DISKON70%">
                    </div>
                    <div class="toggle-switch">
                        <label class="switch-label">
                            Status Running Teks
                            <div class="toggle-container">
                                <input type="checkbox" id="runningTextToggle">
                                <span class="toggle-slider"></span>
                            </div>
                        </label>
                    </div>
                    <button type="submit" class="admin-btn">Save Running Text</button>
                </form>
            </div>

            <!-- Reset Key System Control -->
            <div class="admin-card fade-in">
                <h3><i class="fas fa-key"></i> Reset Key System</h3>
                <div class="toggle-switch">
                    <label class="switch-label">
                        Status Reset Key System
                        <div class="toggle-container">
                            <input type="checkbox" id="resetKeyToggle" checked>
                            <span class="toggle-slider"></span>
                        </div>
                    </label>
                </div>
                <button class="admin-btn" id="saveResetKeyStatus">Save Status</button>
            </div>

            <!-- Product List -->
            <div class="admin-card fade-in full-width">
                <h3><i class="fas fa-edit"></i> Edit/Hapus Product</h3>
                <div class="product-list" id="productList">
                    <!-- Products will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Overlay -->
        <div class="overlay" id="overlay"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
</body>
</html>
