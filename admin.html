<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo">
            </div>
            <div class="loading-text">
                <span>D</span>
                <span>R</span>
                <span>I</span>
                <span>P</span>
                <span>&nbsp;</span>
                <span>C</span>
                <span>L</span>
                <span>I</span>
                <span>E</span>
                <span>N</span>
                <span>T</span>
            </div>
            <div class="loading-progress">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent" style="display: none;">
        <!-- Background Animation -->
        <div class="background-animation">
            <div class="gradient-bg"></div>
            <div class="particles"></div>
        </div>

        <!-- Admin Dashboard -->
        <div class="admin-container">
            <div class="admin-header">
                <div class="admin-logo">
                    <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Logo">
                    <h1>Admin Panel</h1>
                </div>
            </div>

            <div class="admin-grid">
                <!-- Add Product Card -->
                <div class="admin-card">
                    <div class="card-header">
                        <i class="fas fa-box"></i>
                        <h3>Add New Product</h3>
                    </div>
                    <div class="card-body">
                        <form id="addProductForm">
                            <div class="admin-input-group">
                                <label>Nama Product</label>
                                <input type="text" id="productName" required>
                            </div>
                            <div class="admin-input-group">
                                <label>Image Product (Link)</label>
                                <input type="url" id="productImage" required>
                            </div>
                            <div class="admin-input-group">
                                <label>Deskripsi Produk</label>
                                <textarea id="productDesc" rows="3" required></textarea>
                            </div>
                            <div class="admin-input-group">
                                <label>Fitur (pisahkan dengan koma)</label>
                                <input type="text" id="productFeatures" placeholder="antiban, silent aim, wallhack" required>
                            </div>
                            <div class="admin-input-group">
                                <label>Dropdown Harga (format: Nama|Harga)</label>
                                <div id="priceInputs">
                                    <input type="text" class="price-option" placeholder="1 DAYS|20000" required>
                                </div>
                                <button type="button" class="add-price-btn" onclick="addPriceOption()">
                                    <i class="fas fa-plus"></i> Tambah Opsi Harga
                                </button>
                            </div>
                            <button type="submit" class="admin-btn">Add Product</button>
                        </form>
                    </div>
                </div>

                <!-- Add Promo Code Card -->
                <div class="admin-card">
                    <div class="card-header">
                        <i class="fas fa-ticket-alt"></i>
                        <h3>Add New Code Promo</h3>
                    </div>
                    <div class="card-body">
                        <form id="addPromoForm">
                            <div class="admin-input-group">
                                <label>Code Promo</label>
                                <input type="text" id="promoCode" required>
                            </div>
                            <div class="admin-input-group">
                                <label>Persen Promo (%)</label>
                                <input type="number" id="promoPercent" min="1" max="100" required>
                            </div>
                            <div class="admin-input-group">
                                <label>Maximal Penggunaan</label>
                                <input type="number" id="promoMaxUse" min="1" required>
                            </div>
                            <button type="submit" class="admin-btn">Add Promo</button>
                        </form>
                    </div>
                </div>

                <!-- Running Text Control Card -->
                <div class="admin-card">
                    <div class="card-header">
                        <i class="fas fa-scroll"></i>
                        <h3>Running Text Control</h3>
                    </div>
                    <div class="card-body">
                        <form id="runningTextForm">
                            <div class="admin-input-group">
                                <label>Masukan Teks</label>
                                <input type="text" id="runningText" placeholder="KODE PROMO TERBARU : DISKON70%">
                            </div>
                            <div class="toggle-switch">
                                <label class="switch">
                                    <input type="checkbox" id="runningTextToggle">
                                    <span class="slider"></span>
                                </label>
                                <span>Aktifkan Running Text</span>
                            </div>
                            <button type="submit" class="admin-btn">Update Running Text</button>
                        </form>
                    </div>
                </div>

                <!-- Existing Products List -->
                <div class="admin-card full-width">
                    <div class="card-header">
                        <i class="fas fa-list"></i>
                        <h3>Daftar Produk</h3>
                    </div>
                    <div class="card-body">
                        <div class="products-list" id="productsList"></div>
                    </div>
                </div>

                <!-- Existing Promos List -->
                <div class="admin-card full-width">
                    <div class="card-header">
                        <i class="fas fa-tags"></i>
                        <h3>Daftar Promo</h3>
                    </div>
                    <div class="card-body">
                        <div class="promos-list" id="promosList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
