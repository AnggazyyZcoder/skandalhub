<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo">
            </div>
            <div class="loading-text">
                <span>D</span>
                <span>R</span>
                <span>I</span>
                <span>P</span>
                <span>&nbsp;</span>
                <span>C</span>
                <span>L</span>
                <span>I</span>
                <span>E</span>
                <span>N</span>
                <span>T</span>
            </div>
            <div class="loading-progress">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-container" style="display: none;" id="adminContainer">
        <div class="animated-bg">
            <div class="gradient-bg"></div>
            <div class="particles"></div>
        </div>

        <!-- Admin Navbar -->
        <div class="admin-navbar">
            <div class="nav-header">
                <div class="logo">
                    <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Logo">
                    <h2>Admin Panel</h2>
                </div>
                <div class="admin-actions">
                    <button id="logoutAdminBtn" class="admin-btn">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>

        <!-- Admin Main Content -->
        <div class="admin-main">
            <div class="admin-grid">
                <!-- Add Product Section -->
                <div class="admin-card fade-in">
                    <div class="card-header">
                        <i class="fas fa-box"></i>
                        <h3>Add New Product</h3>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <i class="fas fa-tag"></i>
                            <input type="text" id="productName" placeholder="Nama Product">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-image"></i>
                            <input type="text" id="productImage" placeholder="Link Image (URL)">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-align-left"></i>
                            <textarea id="productDesc" placeholder="Deskripsi Produk" rows="3"></textarea>
                        </div>
                        <div class="input-group">
                            <i class="fas fa-list"></i>
                            <input type="text" id="productFeatures" placeholder="Fitur (pisahkan dengan koma)">
                        </div>
                        
                        <!-- Price Options -->
                        <div class="price-options">
                            <h4>Harga Options</h4>
                            <div id="priceFields">
                                <div class="price-field">
                                    <input type="text" placeholder="Label (contoh: 1 DAYS)" class="price-label">
                                    <input type="number" placeholder="Harga (Rp)" class="price-value">
                                    <button class="remove-price"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                            <button class="add-price-btn" id="addPriceField">
                                <i class="fas fa-plus"></i> Tambah Harga
                            </button>
                        </div>
                        
                        <button class="admin-submit-btn" id="addProductBtn">
                            <i class="fas fa-plus-circle"></i> Add New Product
                        </button>
                    </div>
                </div>

                <!-- Add Promo Code Section -->
                <div class="admin-card fade-in">
                    <div class="card-header">
                        <i class="fas fa-gift"></i>
                        <h3>Add New Code Promo</h3>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <i class="fas fa-code"></i>
                            <input type="text" id="promoCode" placeholder="Masukan Code Promo">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-percent"></i>
                            <input type="number" id="promoPercent" placeholder="Persen Promo (contoh: 70)">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-users"></i>
                            <input type="number" id="promoMaxUse" placeholder="Maximal penggunaan">
                        </div>
                        <button class="admin-submit-btn" id="addPromoBtn">
                            <i class="fas fa-plus-circle"></i> Add New Code Promo
                        </button>
                    </div>
                </div>

                <!-- Running Text Control Section -->
                <div class="admin-card fade-in">
                    <div class="card-header">
                        <i class="fas fa-running"></i>
                        <h3>Running Text Control</h3>
                    </div>
                    <div class="card-body">
                        <div class="input-group">
                            <i class="fas fa-pen"></i>
                            <input type="text" id="runningText" placeholder="Masukan teks running">
                        </div>
                        <div class="toggle-switch">
                            <label class="switch">
                                <input type="checkbox" id="runningTextToggle">
                                <span class="slider round"></span>
                            </label>
                            <span>On/Off Running Text</span>
                        </div>
                        <button class="admin-submit-btn" id="saveRunningTextBtn">
                            <i class="fas fa-save"></i> Save Running Text
                        </button>
                    </div>
                </div>

                <!-- Products List Section -->
                <div class="admin-card fade-in admin-full-width">
                    <div class="card-header">
                        <i class="fas fa-list"></i>
                        <h3>Products List</h3>
                    </div>
                    <div class="card-body">
                        <div class="products-list" id="adminProductsList">
                            <!-- Products will be loaded here -->
                        </div>
                    </div>
                </div>

                <!-- Promo Codes List Section -->
                <div class="admin-card fade-in admin-full-width">
                    <div class="card-header">
                        <i class="fas fa-tags"></i>
                        <h3>Promo Codes List</h3>
                    </div>
                    <div class="card-body">
                        <div class="promo-list" id="adminPromoList">
                            <!-- Promo codes will be loaded here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.classList.add('fade-out');
                
                setTimeout(function() {
                    loadingScreen.style.display = 'none';
                    document.getElementById('adminContainer').style.display = 'block';
                    
                    // Load admin data
                    if (window.adminFunctions) {
                        window.adminFunctions.loadAdminProducts();
                        window.adminFunctions.loadAdminPromos();
                    }
                }, 1000);
            }, 3000);
        });
    </script>
</body>
</html>
