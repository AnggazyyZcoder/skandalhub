<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo">
            </div>
            <div class="loading-text">
                <span>D</span>
                <span>R</span>
                <span>I</span>
                <span>P</span>
                <span>&nbsp;</span>
                <span>C</span>
                <span>L</span>
                <span>I</span>
                <span>E</span>
                <span>N</span>
                <span>T</span>
            </div>
            <div class="loading-progress">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent" style="display: none;">
        <!-- Background Animation -->
        <div class="background-animation">
            <div class="gradient-bg"></div>
            <div class="particles"></div>
        </div>

        <!-- Navbar -->
        <div class="navbar">
            <div class="nav-left">
                <div class="user-greeting">
                    <i class="fas fa-hand-wave"></i>
                    <span id="usernameDisplay"></span>
                </div>
            </div>
            <div class="nav-right">
                <div class="hamburger-menu" id="hamburgerMenu">
                    <i class="fas fa-ellipsis-h"></i>
                </div>
            </div>
        </div>

        <!-- Sidebar Navigation -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Logo" class="sidebar-logo">
                <span class="sidebar-title">Drip Client</span>
                <i class="fas fa-times close-sidebar" id="closeSidebar"></i>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><a href="#"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-shopping-cart"></i> Produk</a></li>
                <li><a href="#"><i class="fas fa-ticket-alt"></i> Promo Saya</a></li>
                <li><a href="#"><i class="fas fa-history"></i> Riwayat</a></li>
                <li><a href="#"><i class="fas fa-question-circle"></i> FAQ</a></li>
                <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <!-- Running Text -->
        <div class="running-text-container" id="runningTextContainer" style="display: none;">
            <div class="running-text">
                <div class="running-text-content" id="runningTextContent"></div>
            </div>
        </div>

        <!-- Main Dashboard Content -->
        <div class="dashboard-container">
            <!-- Products Section -->
            <div class="products-section">
                <h2 class="section-title">
                    <i class="fas fa-crown"></i>
                    Produk Tersedia
                </h2>
                <div class="products-grid" id="productsGrid"></div>
            </div>

            <!-- FAQ Section -->
            <div class="faq-section">
                <h2 class="section-title">
                    <i class="fas fa-question-circle"></i>
                    Frequently Asked Questions
                </h2>
                <div class="faq-grid" id="faqGrid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
