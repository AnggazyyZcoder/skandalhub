<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client">
            </div>
            <div class="loading-text">
                <span>D</span>
                <span>R</span>
                <span>I</span>
                <span>P</span>
                <span>&nbsp;</span>
                <span>C</span>
                <span>L</span>
                <span>I</span>
                <span>E</span>
                <span>N</span>
                <span>T</span>
            </div>
            <div class="loading-progress">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <div class="dashboard" id="dashboard" style="display: none;">
        <!-- Animated Background -->
        <div class="animated-bg">
            <div class="gradient-sphere"></div>
            <div class="gradient-sphere"></div>
            <div class="gradient-sphere"></div>
        </div>

        <!-- Navbar -->
        <nav class="navbar">
            <div class="nav-left">
                <div class="logo animated-logo">
                    <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client">
                </div>
                <div class="user-greeting">
                    <i class="fas fa-hand-wave"></i>
                    <span>Hello, <span id="username">User</span></span>
                </div>
                <div class="user-credit">
                    <i class="fas fa-dollar-sign"></i>
                    <span id="creditSaldo">0</span>
                </div>
            </div>
            <div class="nav-right">
                <div class="menu-toggle" id="menuToggle">
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>
        </nav>

        <!-- Side Menu -->
        <div class="side-menu" id="sideMenu">
            <div class="menu-header">
                <h3>Quick Actions</h3>
                <i class="fas fa-times close-menu" id="closeMenu"></i>
            </div>
            <div class="menu-items">
                <div class="menu-item" onclick="openResetKeyModal()">
                    <i class="fas fa-key"></i>
                    <span>Reset Key</span>
                </div>
                <div class="menu-item" onclick="openTransactionLogs()">
                    <i class="fas fa-history"></i>
                    <span>Logs Transaksi</span>
                </div>
                <div class="menu-item" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </div>
            </div>
        </div>

        <!-- Running Text -->
        <div class="running-text-container" id="runningTextContainer" style="display: none;">
            <div class="running-text">
                <span id="runningText"></span>
            </div>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid"></div>

        <!-- Reset Key Modal -->
        <div class="modal" id="resetKeyModal">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-logo">
                        <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client">
                    </div>
                    <i class="fas fa-times modal-close" onclick="closeResetKeyModal()"></i>
                </div>
                <h3>Reset Key System</h3>
                <div class="input-group">
                    <input type="text" id="resetInput" placeholder="Masukkan key lama">
                </div>
                <button class="btn-primary" onclick="processResetKey()" id="resetKeyBtn">
                    <span>Reset</span>
                </button>
                <div class="response-container" id="resetResponse"></div>
            </div>
        </div>

        <!-- Product Detail Modal -->
        <div class="modal" id="productModal">
            <div class="modal-content product-detail">
                <i class="fas fa-times modal-close" onclick="closeProductModal()"></i>
                <div id="productDetailContent"></div>
            </div>
        </div>

        <!-- Transaction Logs Modal -->
        <div class="modal" id="transactionLogsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Logs Transaksi</h3>
                    <i class="fas fa-times modal-close" onclick="closeTransactionLogs()"></i>
                </div>
                <div id="transactionLogsContent"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
