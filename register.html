<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
</head>
<body class="login-page">
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo">
            </div>
            <h1 class="loading-text">
                <span>D</span><span>R</span><span>I</span><span>P</span>
                <span>&nbsp;</span>
                <span>C</span><span>L</span><span>I</span><span>E</span><span>N</span><span>T</span>
            </h1>
            <div class="loading-progress">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- Register Container -->
    <div class="login-container" id="registerContainer" style="display: none;">
        <div class="animated-bg">
            <div class="gradient-bg"></div>
            <div class="particles"></div>
        </div>
        
        <div class="login-card">
            <div class="login-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo" class="animated-logo">
                <div class="logo-glow"></div>
            </div>
            
            <h2>Buat Akun Baru</h2>
            
            <form id="registerForm">
                <div class="input-group">
                    <label for="regUsername"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="regUsername" placeholder="Pilih username" required>
                </div>
                
                <div class="input-group">
                    <label for="regPassword"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-input">
                        <input type="password" id="regPassword" placeholder="Buat password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('regPassword')"></i>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="confirmPassword"><i class="fas fa-lock"></i> Konfirmasi Password</label>
                    <div class="password-input">
                        <input type="password" id="confirmPassword" placeholder="Konfirmasi password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                    </div>
                </div>
                
                <div class="form-options">
                    <a href="index.html" class="register-link">Sudah punya akun? Login</a>
                </div>
                
                <button type="submit" class="login-btn">
                    <span>Register</span>
                    <i class="fas fa-user-plus"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Loading screen animation
            setTimeout(function() {
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.style.animation = 'fadeOut 0.8s ease forwards';
                
                setTimeout(function() {
                    loadingScreen.style.display = 'none';
                    document.getElementById('registerContainer').style.display = 'flex';
                }, 800);
            }, 3000);
        });
    </script>
</body>
</html>
