<!-- register.html -->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Logo" class="loading-logo">
            <div class="loading-text">
                <span>D</span><span>R</span><span>I</span><span>P</span>
                <span>&nbsp;</span>
                <span>C</span><span>L</span><span>I</span><span>E</span><span>N</span><span>T</span>
            </div>
            <div class="loading-progress">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Register Container -->
    <div class="login-container" id="registerContainer" style="display: none;">
        <div class="login-card">
            <div class="login-header">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Logo" class="login-logo">
                <h2>Buat Akun Baru</h2>
            </div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="registerUsername" placeholder="Masukkan username" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <div class="password-input">
                        <input type="password" id="registerPassword" placeholder="Masukkan password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('registerPassword', this)"></i>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Konfirmasi Password</label>
                    <div class="password-input">
                        <input type="password" id="confirmPassword" placeholder="Konfirmasi password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="registerBtn">
                    <span>Daftar</span>
                    <i class="fas fa-user-plus"></i>
                </button>
                
                <div class="form-footer">
                    <p>Sudah punya akun? <a href="index.html">Login</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.style.animation = 'fadeOut 0.8s ease forwards';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    document.getElementById('registerContainer').style.display = 'flex';
                }, 800);
            }, 3000);
        });
    </script>
</body>
</html>
