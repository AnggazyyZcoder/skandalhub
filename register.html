<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Register</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="floating-bg"></div>
        <div class="auth-card">
            <div class="auth-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client">
            </div>
            <h2>Buat Akun Baru</h2>
            
            <form id="registerForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="registerUsername" placeholder="Username" required>
                </div>
                
                <div class="input-group password-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="registerPassword" placeholder="Password" required>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePassword('registerPassword', this)"></i>
                </div>
                
                <div class="input-group password-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Konfirmasi Password" required>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
                </div>
                
                <button type="submit" class="auth-btn">
                    <span>Register</span>
                    <i class="fas fa-user-plus"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Sudah punya akun? <a href="index.html">Login</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
