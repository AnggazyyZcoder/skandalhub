<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drip Client - Register</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>

<!-- Particles Background -->
<div id="particles-js"></div>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-logo-wrapper">
    <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client" class="loading-logo-img"/>
    <div class="loading-title-row" id="loading-chars"></div>
    <div class="loading-subtitle">Create Account</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill"></div>
    </div>
  </div>
</div>

<!-- Auth Wrapper -->
<div class="auth-wrapper" id="auth-content" style="display:none;">
  <div class="auth-card" id="auth-card">
    <div class="auth-logo-section">
      <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client" class="auth-logo-img"/>
      <div>
        <div class="auth-title">DRIP CLIENT</div>
        <div class="auth-subtitle">Buat Akun Baru</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label"><i class="fa fa-user"></i> &nbsp;Username</label>
      <input type="text" class="form-control" id="reg-username" placeholder="Pilih username unik" autocomplete="off"/>
    </div>

    <div class="form-group">
      <label class="form-label"><i class="fa fa-lock"></i> &nbsp;Password</label>
      <div class="input-icon-wrap">
        <input type="password" class="form-control" id="reg-password" placeholder="Buat password kuat" autocomplete="off"/>
        <button class="input-icon-btn" type="button" onclick="togglePass('reg-password','toggle-reg-pass')" id="toggle-reg-pass">
          <i class="fa fa-eye"></i>
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label"><i class="fa fa-lock"></i> &nbsp;Konfirmasi Password</label>
      <div class="input-icon-wrap">
        <input type="password" class="form-control" id="reg-confirm" placeholder="Konfirmasi password" autocomplete="off"/>
        <button class="input-icon-btn" type="button" onclick="togglePass('reg-confirm','toggle-reg-confirm')" id="toggle-reg-confirm">
          <i class="fa fa-eye"></i>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="register-btn" onclick="doRegister()">
      <i class="fa fa-user-plus"></i> &nbsp;REGISTER
    </button>

    <div class="auth-link">
      Sudah punya akun? <a href="index.html">Login Sekarang</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  initLoadingScreen('register');
  initParticles();
</script>
</body>
</html>
