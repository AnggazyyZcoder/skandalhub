<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drip Client — Register</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="icon" href="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" type="image/jpeg" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <canvas id="particle-canvas"></canvas>

  <!-- LOADING SCREEN -->
  <div id="loading-screen">
    <div class="loading-logo-wrap">
      <img class="loading-logo-img" src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client" />
      <div class="loading-title-chars" id="loadingChars"></div>
    </div>
    <div class="loading-subtitle">BUY KEY SYSTEM</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar"></div>
    </div>
    <div class="loading-percent" id="loadingPercent">0%</div>
  </div>

  <div class="page-wrapper" id="mainContent" style="display:none;">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo-wrap">
          <img class="auth-logo" src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client" />
          <div class="auth-title"><i class="fas fa-meteor"></i> DRIP CLIENT</div>
          <div class="auth-subtitle">Buat Akun Baru</div>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fas fa-user"></i> Username</label>
          <div class="input-with-icon">
            <input type="text" class="form-input" id="regUsername" placeholder="Pilih username unik..." autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
          <div class="input-with-icon">
            <input type="email" class="form-input" id="regEmail" placeholder="Email kamu..." autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Password</label>
          <div class="input-with-icon" style="position:relative;">
            <input type="password" class="form-input" id="regPassword" placeholder="Buat password kuat..." autocomplete="new-password" style="padding-right:48px;" />
            <span class="input-icon" id="toggleRegPw" onclick="togglePassword('regPassword','toggleRegPw')">
              <i class="fas fa-eye"></i>
            </span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fas fa-lock"></i> Konfirmasi Password</label>
          <div class="input-with-icon" style="position:relative;">
            <input type="password" class="form-input" id="regConfirmPassword" placeholder="Ulangi password..." autocomplete="new-password" style="padding-right:48px;" />
            <span class="input-icon" id="toggleRegCfPw" onclick="togglePassword('regConfirmPassword','toggleRegCfPw')">
              <i class="fas fa-eye"></i>
            </span>
          </div>
        </div>

        <button class="btn-primary" id="registerBtn" onclick="handleRegister()">
          <i class="fas fa-user-plus"></i> DAFTAR SEKARANG
        </button>

        <div class="auth-footer" style="margin-top:20px;">
          Sudah punya akun? <a href="index.html"><i class="fas fa-sign-in-alt"></i> Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    initLoadingScreen('mainContent');
  </script>
</body>
</html>
