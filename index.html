<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader-container">
            <div class="loader-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client">
            </div>
            <div class="loader-text">
                <span>D</span><span>R</span><span>I</span><span>P</span>
                <span>&nbsp;</span>
                <span>C</span><span>L</span><span>I</span><span>E</span><span>N</span><span>T</span>
            </div>
            <div class="loader-progress">
                <div class="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Login Container (initially hidden) -->
    <div class="auth-container" id="loginContainer" style="display: none;">
        <div class="floating-bg"></div>
        <div class="auth-card animate-fade-in">
            <div class="auth-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client">
            </div>
            <h2>Login To Dashboard</h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="loginUsername" placeholder="Username" required>
                </div>
                
                <div class="input-group password-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePassword('loginPassword', this)"></i>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember Me</span>
                    </label>
                    <a href="#" class="forgot-link">Lupa Password?</a>
                </div>
                
                <button type="submit" class="auth-btn">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Tidak punya akun? <a href="register.html">Daftar</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Loading screen logic
        setTimeout(() => {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.add('fade-out');
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                document.getElementById('loginContainer').style.display = 'flex';
            }, 500);
        }, 3000);
    </script>
</body>
</html>
