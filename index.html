<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo">
            </div>
            <div class="loading-text">
                <span class="loading-letter">D</span>
                <span class="loading-letter">R</span>
                <span class="loading-letter">I</span>
                <span class="loading-letter">P</span>
                <span class="loading-letter">&nbsp;</span>
                <span class="loading-letter">C</span>
                <span class="loading-letter">L</span>
                <span class="loading-letter">I</span>
                <span class="loading-letter">E</span>
                <span class="loading-letter">N</span>
                <span class="loading-letter">T</span>
            </div>
            <div class="loading-progress">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- Login Container -->
    <div class="login-container" id="loginContainer" style="display: none;">
        <div class="login-card animate-fade-in">
            <div class="login-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo">
                <div class="logo-glow"></div>
            </div>
            <h1 class="login-title">Login To Dashboard</h1>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Masukkan username" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Masukkan password" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="login-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        Remember Me
                    </label>
                    <a href="#" class="forgot-password">Lupa password?</a>
                </div>

                <button type="submit" class="login-button" id="loginButton">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>

                <p class="register-link">
                    Tidak punya akun? <a href="register.html">Daftar</a>
                </p>
            </form>
        </div>
    </div>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
