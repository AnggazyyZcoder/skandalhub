<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drip Client - Login</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>

<!-- Particles Background -->
<div id="particles-js"></div>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-logo-wrapper">
    <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client" class="loading-logo-img"/>
    <div class="loading-title-row" id="loading-chars"></div>
    <div class="loading-subtitle">Buy Key Platform</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill"></div>
    </div>
  </div>
</div>

<!-- Welcome Overlay -->
<div id="welcome-overlay">
  <div class="welcome-text" id="welcome-text"></div>
</div>

<!-- Auth Wrapper -->
<div class="auth-wrapper" id="auth-content" style="display:none;">
  <div class="auth-card" id="auth-card">
    <div class="auth-logo-section">
      <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client" class="auth-logo-img animated-logo"/>
      <div>
        <div class="auth-title">DRIP CLIENT</div>
        <div class="auth-subtitle">Login To Dashboard</div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label"><i class="fa fa-user"></i> &nbsp;Username</label>
      <input type="text" class="form-control" id="login-username" placeholder="Masukan username" autocomplete="off"/>
    </div>

    <div class="form-group">
      <label class="form-label"><i class="fa fa-lock"></i> &nbsp;Password</label>
      <div class="input-icon-wrap">
        <input type="password" class="form-control" id="login-password" placeholder="Masukan password" autocomplete="off"/>
        <button class="input-icon-btn" id="toggle-pass" type="button" onclick="togglePass('login-password','toggle-pass')">
          <i class="fa fa-eye"></i>
        </button>
      </div>
    </div>

    <div class="remember-row">
      <label class="checkbox-wrap">
        <input type="checkbox" id="remember-me"/>
        <span>Remember Me</span>
      </label>
    </div>

    <button class="btn-primary" id="login-btn" onclick="doLogin()">
      <i class="fa fa-sign-in-alt"></i> &nbsp;LOGIN
    </button>

    <div class="auth-link">
      Tidak punya akun? <a href="register.html">Daftar Sekarang</a>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  // Init loading screen
  initLoadingScreen('login');
  initParticles();

  // Auto-fill if remembered
  window.addEventListener('load', () => {
    const saved = localStorage.getItem('drip_remember');
    if (saved) {
      const d = JSON.parse(saved);
      document.getElementById('login-username').value = d.u || '';
      document.getElementById('login-password').value = d.p || '';
      document.getElementById('remember-me').checked = true;
    }
  });
</script>
</body>
</html>
