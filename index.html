<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drip Client - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-logo">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo">
            </div>
            <div class="loading-text">
                <span>D</span>
                <span>R</span>
                <span>I</span>
                <span>P</span>
                <span>&nbsp;</span>
                <span>C</span>
                <span>L</span>
                <span>I</span>
                <span>E</span>
                <span>N</span>
                <span>T</span>
            </div>
            <div class="loading-progress">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <!-- Login Container -->
    <div class="login-container fade-in" style="display: none;" id="loginContainer">
        <div class="animated-bg">
            <div class="gradient-bg"></div>
            <div class="particles"></div>
        </div>
        
        <div class="login-card">
            <div class="logo-container">
                <img src="https://cdn-uploads.huggingface.co/production/uploads/noauth/8W2qfrJxJ0G0EplunCycM.jpeg" alt="Drip Client Logo" class="login-logo">
                <div class="logo-animation">
                    <i class="fas fa-circle"></i>
                    <i class="fas fa-circle"></i>
                    <i class="fas fa-circle"></i>
                </div>
            </div>
            
            <h2>Login To Dashboard</h2>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Username" autocomplete="off">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password">
            </div>
            
            <div class="remember-me">
                <label class="checkbox-container">
                    <input type="checkbox" id="rememberMe">
                    <span class="checkmark"></span>
                    Remember Me
                </label>
            </div>
            
            <button class="login-btn" id="loginBtn">
                <span>Login</span>
                <i class="fas fa-arrow-right"></i>
            </button>
            
            <div class="register-link">
                Tidak punya akun? <a href="register.html">Daftar</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize login page
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const loadingScreen = document.getElementById('loadingScreen');
                loadingScreen.classList.add('fade-out');
                
                setTimeout(function() {
                    loadingScreen.style.display = 'none';
                    document.getElementById('loginContainer').style.display = 'flex';
                }, 1000);
            }, 3000);
        });
    </script>
</body>
</html>
